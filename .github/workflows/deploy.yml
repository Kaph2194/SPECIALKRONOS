name: Deploy Kronos to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          REACT_APP_GOOGLE_CLIENT_ID: 359561186899-si9voh2chbu51ji41di4v5j8cqhj365q.apps.googleusercontent.com
          REACT_APP_GOOGLE_API_KEY: 359561186899-si9voh2chbu51ji41di4v5j8cqhj365q.apps.googleusercontent.com
          CI: false

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build